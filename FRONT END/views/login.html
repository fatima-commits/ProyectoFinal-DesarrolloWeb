<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>LOOP - Wellness Tracker</title>

    <!-- Bootstrap CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
        crossorigin="anonymous"
    />
    <link rel="stylesheet" href="../assets/ProyectoFinal_Styles.css">
</head>

<body>
    <header>
    </header>

    <main>
        <div class="card-container">
            <div class="card">
                <div class="card-body">
                    <div class="logo-header">
                        <div class="logo-text">LOOP</div>
                        <div class="logo-subtitle">Wellness Tracker</div>
                    </div>

                    <div class="separator"></div>

                    <!-- FORM LOGIN -->
                    <form id="formLogin" class="form-section">
                        <div class="form-title">Welcome back!</div>

                        <!-- Mensaje de error -->
                        <div id="loginError" class="alert alert-danger" role="alert" style="display: none;">
                        </div>

                        <!-- Mensaje de éxito -->
                        <div id="loginSuccess" class="alert alert-success" role="alert" style="display: none;">
                        </div>

                        <div class="form-group">
                            <label for="InputEmail1" class="form-label">Correo</label>
                            <input 
                                type="email" 
                                name="email" 
                                class="form-control" 
                                id="InputEmail1" 
                                placeholder="usuario@ejemplo.com"
                                required
                            />
                        </div>

                        <div class="form-group">
                            <label for="InputPassword1" class="form-label">Contraseña</label>
                            <input 
                                type="password" 
                                name="password" 
                                class="form-control" 
                                id="InputPassword1" 
                                placeholder="••••••••"
                                required
                            />
                        </div>

                        <div class="button-group">
                            <button type="submit" class="btn btn-login" id="loginBtn">
                                Iniciar sesión
                            </button>
                            <button type="button" class="btn btn-register" onclick="toggleForms()">
                                Registrarse
                            </button>
                        </div>
                    </form>

                    <!-- FORM REGISTER -->
                    <form id="formRegister" class="form-section hidden">
                        <div class="form-title">Create Account</div>

                        <!-- Mensaje de error -->
                        <div id="registerError" class="alert alert-danger" role="alert" style="display: none;">
                        </div>

                        <!-- Mensaje de éxito -->
                        <div id="registerSuccess" class="alert alert-success" role="alert" style="display: none;">
                        </div>

                        <div class="form-group">
                            <label for="InputName" class="form-label">Nombre Completo</label>
                            <input 
                                type="text" 
                                name="name" 
                                class="form-control" 
                                id="InputName" 
                                placeholder="Juan Pérez"
                                required
                            />
                        </div>

                        <div class="form-group">
                            <label for="InputEmail2" class="form-label">Correo</label>
                            <input 
                                type="email" 
                                name="email" 
                                class="form-control" 
                                id="InputEmail2" 
                                placeholder="usuario@ejemplo.com"
                                required
                            />
                        </div>

                        <div class="form-group">
                            <label for="InputPassword2" class="form-label">Contraseña</label>
                            <input 
                                type="password" 
                                name="password" 
                                class="form-control" 
                                id="InputPassword2" 
                                placeholder="••••••••"
                                required
                            />
                            <small class="form-text text-muted">Mínimo 8 caracteres</small>
                        </div>

                        <div class="form-group">
                            <label for="InputConfirmPassword" class="form-label">Confirmar Contraseña</label>
                            <input 
                                type="password" 
                                name="confirm_password" 
                                class="form-control" 
                                id="InputConfirmPassword" 
                                placeholder="••••••••"
                                required
                            />
                        </div>

                        <div class="button-group">
                            <button type="submit" class="btn btn-login" id="registerBtn">
                                Crear cuenta
                            </button>
                            <button type="button" class="btn btn-register" onclick="toggleForms()">
                                Iniciar sesión
                            </button>
                        </div>
                    </form>

                    <div class="footer-text">
                        ¿No tienes cuenta? <strong onclick="toggleForms()">Regístrate aquí</strong>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer>
    </footer>

    <!--  MODAL DE CONFIRMACIÓN -->
    <div class="modal fade" id="confirmationModal" tabindex="-1" aria-labelledby="confirmationModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="confirmationModalLabel">Confirmación</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="modalMessage">
                    ¿Estás seguro de que deseas continuar?
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-login" id="confirmBtn">Confirmar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script
        src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"
    ></script>
    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
        integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
        crossorigin="anonymous"
    ></script>

    <script>
        // Toggle entre formularios
        function toggleForms() {
            const formLogin = document.getElementById('formLogin');
            const formRegister = document.getElementById('formRegister');
            
            formLogin.classList.toggle('hidden');
            formRegister.classList.toggle('hidden');

            // Limpiar mensajes de error y éxito
            document.getElementById('loginError').style.display = 'none';
            document.getElementById('loginSuccess').style.display = 'none';
            document.getElementById('registerError').style.display = 'none';
            document.getElementById('registerSuccess').style.display = 'none';
        }

        // Manejo de LOGIN
        document.getElementById('formLogin').addEventListener('submit', async function(e) {
            e.preventDefault();

            const email = document.getElementById('InputEmail1').value;
            const password = document.getElementById('InputPassword1').value;
            const errorDiv = document.getElementById('loginError');
            const successDiv = document.getElementById('loginSuccess');

            try {
                const response = await fetch('/api/users/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                if (response.ok) {
                    const user = await response.json();
                    
                    // Guardar datos del usuario en localStorage
                    localStorage.setItem('user', JSON.stringify(user));
                    localStorage.setItem('authToken', user.contraseña);
                    
                    // Mostrar mensaje de éxito
                    successDiv.textContent = '¡Login exitoso! Redirigiendo...';
                    successDiv.style.display = 'block';
                    errorDiv.style.display = 'none';

                    // Redirigir después de 1.5 segundos
                    setTimeout(() => {
                        window.location.href = '/home.html';
                    }, 1500);

                } else if (response.status === 401) {
                    errorDiv.textContent = 'Email o contraseña incorrectos. Intenta de nuevo.';
                    errorDiv.style.display = 'block';
                    successDiv.style.display = 'none';
                } else {
                    const error = await response.json();
                    errorDiv.textContent = error.error || 'Error en el login. Intenta de nuevo.';
                    errorDiv.style.display = 'block';
                    successDiv.style.display = 'none';
                }

            } catch (error) {
                console.error('Error:', error);
                errorDiv.textContent = 'Error de conexión. Intenta de nuevo.';
                errorDiv.style.display = 'block';
                successDiv.style.display = 'none';
            }
        });

        // Manejo de REGISTER
        document.getElementById('formRegister').addEventListener('submit', async function(e) {
            e.preventDefault();

            const name = document.getElementById('InputName').value;
            const email = document.getElementById('InputEmail2').value;
            const password = document.getElementById('InputPassword2').value;
            const confirmPassword = document.getElementById('InputConfirmPassword').value;
            const errorDiv = document.getElementById('registerError');
            const successDiv = document.getElementById('registerSuccess');

            // Validación en cliente
            if (password !== confirmPassword) {
                errorDiv.textContent = 'Las contraseñas no coinciden. Intenta de nuevo.';
                errorDiv.style.display = 'block';
                successDiv.style.display = 'none';
                return;
            }

            if (password.length < 8) {
                errorDiv.textContent = 'La contraseña debe tener mínimo 8 caracteres.';
                errorDiv.style.display = 'block';
                successDiv.style.display = 'none';
                return;
            }

            try {
                const response = await fetch('/api/users/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ name, email, password, confirm_password: confirmPassword })
                });

                if (response.ok) {
                    const user = await response.json();
                    
                    // Mostrar mensaje de éxito
                    successDiv.textContent = '¡Registro exitoso! Iniciando sesión automáticamente...';
                    successDiv.style.display = 'block';
                    errorDiv.style.display = 'none';

                    // Guardar datos del usuario
                    localStorage.setItem('user', JSON.stringify(user));
                    localStorage.setItem('authToken', user.contraseña);

                    // Limpiar formularios
                    document.getElementById('formRegister').reset();
                    document.getElementById('formLogin').reset();

                    // Redirigir después de 1.5 segundos
                    setTimeout(() => {
                        window.location.href = '/home.html';
                    }, 1500);

                } else if (response.status === 400) {
                    const error = await response.json();
                    errorDiv.textContent = error.error || error.message || 'Error en el registro. Intenta de nuevo.';
                    errorDiv.style.display = 'block';
                    successDiv.style.display = 'none';
                } else {
                    const error = await response.json();
                    errorDiv.textContent = error.error || 'Error desconocido. Intenta de nuevo.';
                    errorDiv.style.display = 'block';
                    successDiv.style.display = 'none';
                }

            } catch (error) {
                console.error('Error:', error);
                errorDiv.textContent = 'Error de conexión. Intenta de nuevo.';
                errorDiv.style.display = 'block';
                successDiv.style.display = 'none';
            }
        });

        // Modal de confirmación
        const confirmationModal = new bootstrap.Modal(document.getElementById('confirmationModal'));
        let pendingAction = null;

        function showConfirmation(title, message, callback) {
            document.getElementById('confirmationModalLabel').textContent = title;
            document.getElementById('modalMessage').textContent = message;
            pendingAction = callback;
            confirmationModal.show();
        }

        document.getElementById('confirmBtn').addEventListener('click', () => {
            if (pendingAction) {
                pendingAction();
            }
            confirmationModal.hide();
        });

    </script>
</body>
</html>
