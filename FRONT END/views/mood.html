<!doctype html>
<html lang="es">
<head>
    <title>Mood Tracker</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles_mood.css">
</head>
<body>

    <div class="bg-overlay"></div>

    <div class="page">

        <!-- Header -->
        <header class="header">
            <div class="header-text">
                <p class="today-date" id="todayDate"></p>
                <h1 class="main-title">How Do You<br>Feel Today?</h1>
            </div>
        </header>

        <!-- Emoji -->
        <div class="emoji-section">
            <div class="emoji-rings">
                <div class="ring ring-3"></div>
                <div class="ring ring-2"></div>
                <div class="ring ring-1"></div>
                <div class="emoji-circle" id="emojiCircle">
                    <svg id="moodFace" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" width="110" height="110">
                        <!-- Cara -->
                        <circle cx="50" cy="50" r="48" fill="#f5c842" id="faceColor"/>
                        <!-- Ojos -->
                        <circle cx="35" cy="40" r="5" fill="#3a2a00" id="eyeL"/>
                        <circle cx="65" cy="40" r="5" fill="#3a2a00" id="eyeR"/>
                        <!-- Boca -->
                        <path id="mouthPath" d="M 30 62 Q 50 78 70 62" stroke="#3a2a00" stroke-width="4" fill="none" stroke-linecap="round"/>
                    </svg>
                </div>
            </div>
            <p class="mood-label" id="moodLabel">Happy</p>
        </div>

        <!-- Slider -->
        <div class="slider-section">
            <div class="slider-track-wrapper">
                <input type="range" min="0" max="100" value="0" class="mood-slider" id="moodSlider">
                <div class="slider-labels">
                    <span class="dot" style="background:#23a133"></span>
                    <span class="dot" style="background:#f5a623"></span>
                    <span class="dot" style="background:#385196"></span>
                    <span class="dot" style="background:#c0392b"></span>
                </div>
            </div>
        </div>

        <!-- Botón guardar (placeholder para el CRUD) -->
        <button class="save-btn" id="saveBtn">Guardar mood</button>

                <!-- Botón para mostrar/ocultar calendario -->
        <button class="toggle-calendar-btn" id="toggleCalendar">Ver semana</button>

        <!-- Calendario semanal -->
        <div class="weekly-calendar" id="weeklyCalendar" style="display:none">
            <h3 class="calendar-title">Esta semana</h3>
            <div class="week-row" id="weekRow"></div>
        </div>

        <button class="back-home-btn" onclick="window.location.href='home.html'">← Home</button>

    </div>

    <script>
        // ── Fecha de hoy ──
        const dateEl = document.getElementById('todayDate');
        const now = new Date();
        dateEl.textContent = now.toLocaleDateString('en-US', {
            weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
        });

        // ── Datos por nivel de mood ──
        const moods = [
            {
                label: 'Happy',
                faceColor: '#23a133',
                ringColor: '#23a133',
                mouth: 'M 30 62 Q 50 78 70 62',   // sonrisa
                eyeType: 'normal'
            },
            {
                label: 'Okay',
                faceColor: '#f5a623',
                ringColor: '#f5a623',
                mouth: 'M 33 65 Q 50 68 67 65',   // neutral
                eyeType: 'normal'
            },
            {
                label: 'Sad',
                faceColor: '#385196',
                ringColor: '#385196',
                mouth: 'M 30 70 Q 50 58 70 70',   // triste
                eyeType: 'sad'
            },
            {
                label: 'Angry',
                faceColor: '#c0392b',
                ringColor: '#c0392b',
                mouth: 'M 30 72 Q 50 68 67 65',   // muy triste / enojado
                eyeType: 'angry'
            }
        ];

        const slider      = document.getElementById('moodSlider');
        const emojiCircle = document.getElementById('emojiCircle');
        const faceColor   = document.getElementById('faceColor');
        const mouthPath   = document.getElementById('mouthPath');
        const moodLabel   = document.getElementById('moodLabel');
        const eyeL        = document.getElementById('eyeL');
        const eyeR        = document.getElementById('eyeR');
        const rings       = document.querySelectorAll('.ring');

        // ── Colores de cada mood ──
const moodColors = {
    Happy: '#f5c842',
    Okay:  '#f5a623',
    Sad:   '#e06030',
    Angry: '#c0392b'
};

// ── Guardar mood en localStorage ──
document.getElementById('saveBtn').addEventListener('click', () => {
    const today = new Date().toISOString().split('T')[0]; // "2026-04-21"
    const index = Math.min(3, Math.floor(slider.value / 25));
    const mood  = moods[index];
    localStorage.setItem('mood_' + today, mood.label);
    alert('Mood guardado: ' + mood.label);
    renderCalendar();
});

// ── Toggle calendario ──
document.getElementById('toggleCalendar').addEventListener('click', () => {
    const cal = document.getElementById('weeklyCalendar');
    const btn = document.getElementById('toggleCalendar');
    if (cal.style.display === 'none') {
        cal.style.display = 'block';
        btn.textContent = 'Ocultar semana';
        renderCalendar();
    } else {
        cal.style.display = 'none';
        btn.textContent = 'Ver semana';
    }
});

    function renderCalendar() {
    const weekRow = document.getElementById('weekRow');
    weekRow.innerHTML = '';
    const days = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
    const today = new Date();

    // ── Datos de ejemplo hardcodeados ──
    const ejemplos = {
        0: 'Happy',   // hace 6 días
        1: 'Okay',    // hace 5 días
        2: 'Sad',     // hace 4 días
        3: null,      // hace 3 días — sin dato
        4: 'Angry',   // hace 2 días
        5: 'Happy',   // ayer
        6: 'Okay',    // hoy
    };

    for (let i = 6; i >= 0; i--) {
        const date = new Date(today);
        date.setDate(today.getDate() - i);
        const label = days[date.getDay()];
        const saved = ejemplos[6 - i]; // usa el dato hardcodeado

        const item = document.createElement('div');
        item.className = 'day-item';

        const circle = document.createElement('div');
        circle.className = 'day-circle' + (saved ? ' filled' : '');
        if (saved) circle.style.background = moodColors[saved];

        const dayLabel = document.createElement('span');
        dayLabel.className = 'day-label';
        dayLabel.textContent = label;

        item.appendChild(circle);
        item.appendChild(dayLabel);
        weekRow.appendChild(item);
    }
}
        
        function updateMood(val) {
            // val va de 0 a 100, dividimos en 4 zonas
            const index = Math.min(3, Math.floor(val / 25));
            const mood  = moods[index];

            // color de la cara
            faceColor.setAttribute('fill', mood.faceColor);

            // boca
            mouthPath.setAttribute('d', mood.mouth);

            // ojos
            if (mood.eyeType === 'angry') {
                eyeL.setAttribute('cy', '43');
                eyeR.setAttribute('cy', '43');
                eyeL.setAttribute('rx', '6');
                eyeL.setAttribute('ry', '4');
                eyeR.setAttribute('rx', '6');
                eyeR.setAttribute('ry', '4');
            } else if (mood.eyeType === 'sad') {
                eyeL.setAttribute('cy', '42');
                eyeR.setAttribute('cy', '42');
            } else {
                eyeL.setAttribute('cy', '40');
                eyeR.setAttribute('cy', '40');
            }

            // color de los rings
            rings.forEach(r => {
                r.style.borderColor = mood.ringColor;
            });

            // label
            moodLabel.textContent = mood.label;
            moodLabel.style.color = mood.faceColor;

            // color del thumb del slider via CSS variable
            document.documentElement.style.setProperty('--thumb-color', mood.faceColor);
        }

        slider.addEventListener('input', () => updateMood(slider.value));

        // Estado inicial
        updateMood(0);
    </script>
</body>


</html>
