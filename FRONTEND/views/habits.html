<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, viewport-fit=cover" />
    <title>Habit Tracker - LOOP Wellness</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="../assets/habits.css">
</head>

<body>
    <div class="habits-container">

        <!-- PANTALLA TODOS LOS HÁBITOS -->
        <div id="all-habits-screen" class="screen-wrapper" style="display: flex; flex-direction: column;">
            <div class="habits-header">
                <h2 class="header-title">Todos los hábitos</h2>
            </div>

            <!-- Filtros por día -->
            <div class="filters-container">
                <button class="filter-btn active" onclick="loadHabits(null)">Todos</button>
                <button class="filter-btn" onclick="loadHabits(1)">L</button>
                <button class="filter-btn" onclick="loadHabits(2)">M</button>
                <button class="filter-btn" onclick="loadHabits(3)">X</button>
                <button class="filter-btn" onclick="loadHabits(4)">J</button>
                <button class="filter-btn" onclick="loadHabits(5)">V</button>
                <button class="filter-btn" onclick="loadHabits(6)">S</button>
                <button class="filter-btn" onclick="loadHabits(7)">D</button>
            </div>

            <!-- Aquí se cargan los hábitos dinámicamente -->
            <div class="habits-list" id="habitsList"></div>

            <div class="bottom-nav">
                <a class="nav-item active" onclick="loadToday()">
                    <span class="nav-icon">🏠</span>
                    <span>Hoy</span>
                </a>
                <a class="nav-item" id="btnNuevoHabito" onclick="switchScreen('new-habit')">
                    <span class="nav-icon">➕</span>
                    <span>Crear nuevo</span>
                </a>
            </div>

            <div class="meditation-footer">
                <div class="footer-logo">LOOP</div>
                <button class="back-btn-main" onclick="goBack()">← Atrás</button>
            </div>
        </div>

        <!-- PANTALLA NUEVO HÁBITO -->
        <div id="new-habit-screen" class="screen-wrapper" style="display: none; flex-direction: column;">
            <div class="new-habit-form">
                <div class="form-header">
                    <button class="form-back" onclick="switchScreen('all-habits')">‹</button>
                    <h2 class="form-title">Nuevo hábito</h2>
                    <button class="cancel-btn" onclick="switchScreen('all-habits')">Cancelar</button>
                </div>

                <form id="habitForm">
                    <div class="form-group">
                        <label class="form-label">Después de</label>
                        <input type="text" id="habitTrigger" class="form-input" placeholder="lavarme los dientes" required/>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Voy a</label>
                        <input type="text" id="habitTitle" class="form-input" placeholder="salir a caminar" required/>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Icono (emoji)</label>
                        <input type="text" id="habitIcon" class="form-input" placeholder="😊" required/>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Selecciona en qué días recordar</label>
                        <div class="option-group">
                            <!-- Días -->
                        <button type="button" class="day-selector" data-day="1" onclick="this.classList.toggle('active')">L</button>
                        <button type="button" class="day-selector" data-day="2" onclick="this.classList.toggle('active')">M</button>
                        <button type="button" class="day-selector" data-day="3" onclick="this.classList.toggle('active')">X</button>
                        <button type="button" class="day-selector" data-day="4" onclick="this.classList.toggle('active')">J</button>
                        <button type="button" class="day-selector" data-day="5" onclick="this.classList.toggle('active')">V</button>
                        <button type="button" class="day-selector" data-day="6" onclick="this.classList.toggle('active')">S</button>
                        <button type="button" class="day-selector" data-day="7" onclick="this.classList.toggle('active')">D</button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Selecciona el color de tu hábito</label>
                        <div class="color-picker">
                            <div class="color-dot orange active" data-color="orange" onclick="selectColor(this)"></div>
                            <div class="color-dot pink" data-color="pink" onclick="selectColor(this)"></div>
                            <div class="color-dot purple" data-color="purple" onclick="selectColor(this)"></div>
                            <div class="color-dot cyan" data-color="cyan" onclick="selectColor(this)"></div>
                        </div>
                    </div>

                    <button type="submit" class="create-habit-btn">Crear nuevo hábito</button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"></script>
    <script src="../controllers/env.js"></script>
    <script src="../controllers/auth_controller.js"></script>
    <script src="../controllers/habits_controller.js"></script>
    <script>
        initHabits();
    </script>
</body>
</html>
