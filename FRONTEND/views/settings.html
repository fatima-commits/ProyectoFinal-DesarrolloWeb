<html lang="es">
<head>
    <title>Settings</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/styles_settings.css">
</head>
<body>

    <div class="bg-overlay"></div>

    <div class="page">

        <!-- Header -->
        <header class="header">
            <p class="page-label">Settings</p>
            <h1 class="main-title">Your profile</h1>
        </header>

        <!-- Foto + nombre -->
        <div class="profile-section">
            <div class="avatar-wrapper">
                <!-- Input file oculto -->
                <input 
                    type="file" 
                    id="profilePhotoInput" 
                    accept="image/*" 
                    style="display: none;"
                />
                
                <!-- Imagen de perfil o placeholder -->
                <img id="avatarImg" class="avatar-img" style="display: none;" alt="Profile photo">
                <span id="avatarPlaceholder" class="avatar-placeholder">👤</span>
                
                <!-- Botón para editar foto -->
                <button id="avatarEditBtn" class="avatar-edit-btn" type="button" title="Cambiar foto de perfil">📷</button>
            </div>

            <div class="name-wrapper">
                <input type="text" class="name-input" id="nameInput" placeholder="Tu nombre">
                <span class="field-hint">Tap to edit</span>
            </div>
        </div>

        <!-- Secciones de campos -->
        <div class="settings-list">

            <!-- Cuerpo -->
            <div class="settings-group">
                <p class="group-label">Body</p>
                <div class="field-row">
                    <span class="field-icon">⚖️</span>
                    <div class="field-content">
                        <label class="field-label">Weight</label>
                        <div class="field-input-row">
                            <input type="number" class="field-input" id="weightInput" placeholder="70">
                            <span class="field-unit">kg</span>
                        </div>
                    </div>
                </div>
                <div class="divider"></div>
                <div class="field-row">
                    <span class="field-icon">📏</span>
                    <div class="field-content">
                        <label class="field-label">Height</label>
                        <div class="field-input-row">
                            <input type="number" class="field-input" id="heightInput" placeholder="175">
                            <span class="field-unit">cm</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Cuenta -->
            <div class="settings-group">
                <p class="group-label">Cuenta</p>
                <div class="field-row">
                    <span class="field-icon">✉️</span>
                    <div class="field-content">
                        <label class="field-label">Email</label>
                        <input type="email" class="field-input full" id="emailInput" placeholder="tu@email.com">
                    </div>
                </div>
                <div class="divider"></div>
                <div class="field-row">
                    <span class="field-icon">🔒</span>
                    <div class="field-content">
                        <label class="field-label">Password</label>
                        <div class="field-input-row">
                            <input type="password" class="field-input full" id="passwordInput" readonly>
                            <button class="toggle-pass" type="button" onclick="togglePassword()">👁</button>
                        </div>
                    </div>
                </div>
            </div>

        </div>

        <!-- Notificación de carga de imagen -->
        <div id="uploadNotification" class="upload-notification" style="display: none;">
            <span id="notificationText">Foto subida exitosamente</span>
        </div>

        <!-- Botón guardar -->
        <button class="save-btn" onclick="saveUserChanges()">GUARDAR CAMBIOS</button>

        <button class="logout-btn" id="btnLogout">Cerrar sesión</button>

        <!-- Botón eliminar cuenta -->
        <button class="delete-account-btn" onclick="confirmDelete()">Eliminar cuenta</button>

        <!-- Modal confirmación eliminar -->
        <div id="modalDeleteUser" class="modal-overlay" style="display:none;" onclick="closeDeleteModal(event)">
            <div class="modal-delete-box" onclick="event.stopPropagation()">
                <h3>Eliminar cuenta</h3>
                <p>¿Estás seguro de que deseas eliminar tu cuenta? Esta acción no se puede deshacer.</p>
                <div class="modal-delete-actions">
                    <button class="btn-cancel" onclick="closeDeleteModal()">Cancelar</button>
                    <button class="btn-confirm-delete" id="btnConfirmDelete">Eliminar</button>
                </div>
            </div>
        </div>

        <!-- Volver -->
        <div class="meditation-footer">
            <div class="footer-logo">LOOP</div>
            <button class="back-btn-main" onclick="window.location.href='home.html'">← Atrás</button>
        </div>
    </div>

    <script src="../controllers/env.js"></script>
    <script src="../controllers/auth_controller.js"></script>
    <script src="../controllers/settings_controller.js"></script>
</body>
</html>
