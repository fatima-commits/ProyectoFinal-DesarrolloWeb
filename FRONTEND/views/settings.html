<!doctype html>
<html lang="es">
<head>
    <title>Settings</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/styles_settings.css">
</head>
<body>

    <div class="bg-overlay"></div>

    <div class="page">

        <!-- Header -->
        <header class="header">
            <p class="page-label">Ajustes</p>
            <h1 class="main-title">Tu perfil</h1>
        </header>

        <!-- Foto + nombre -->
        <div class="profile-section">
            <div class="avatar-wrapper">
                <span class="avatar-placeholder">👤</span>
                <span class="avatar-edit-btn">📷</span>
            </div>
            <div class="name-wrapper">
                <input type="text" class="name-input">
                <span class="field-hint">Selecciona para editar</span>
            </div>
        </div>

        <!-- Secciones de campos -->
        <div class="settings-list">

            <!-- Cuerpo -->
            <div class="settings-group">
                <p class="group-label">Cuerpo</p>
                <div class="field-row">
                    <span class="field-icon">⚖️</span>
                    <div class="field-content">
                        <label class="field-label">Peso</label>
                        <div class="field-input-row">
                            <input type="number" class="field-input" id="weightInput">
                            <span class="field-unit">kg</span>
                        </div>
                    </div>
                </div>
                <div class="divider"></div>
                <div class="field-row">
                    <span class="field-icon">📏</span>
                    <div class="field-content">
                        <label class="field-label">Altura</label>
                        <div class="field-input-row">
                            <input type="number" class="field-input" id="heightInput">
                            <span class="field-unit">cm</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Cuenta -->
            <div class="settings-group">
                <p class="group-label">Cuenta</p>
                <div class="field-row">
                    <span class="field-icon">✉️</span>
                    <div class="field-content">
                        <label class="field-label">Email</label>
                        <input type="email" class="field-input full">
                    </div>
                </div>
                <div class="divider"></div>
                <div class="field-row">
                    <span class="field-icon">🔒</span>
                    <div class="field-content">
                        <label class="field-label">Contraseña</label>
                        <div class="field-input-row">
                            <input type="password" class="field-input full">
                            <div class="field-input-row">
                                <input type="password" class="field-input full" id="passwordInput" value="MaRiAn4;" readonly>
                                <button class="toggle-pass" onclick="togglePassword()">👁</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>

        <!-- Botón guardar -->
        <button class="save-btn" onclick="saveUserChanges()">Guardar cambios</button>

        <button class="logout-btn" id="btnLogout">Cerrar sesión</button>

        <!-- Volver -->
        <div class="meditation-footer">
            <div class="footer-logo">LOOP</div>
            <button class="back-btn-main" onclick="window.location.href='home.html'">← Atrás</button>
        </div>
    </div>

    <script src="../controllers/env.js"></script>
    <script src="../controllers/auth_controller.js"></script>
</body>
</html>
