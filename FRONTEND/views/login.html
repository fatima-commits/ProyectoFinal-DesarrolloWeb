<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>LOOP - Wellness Tracker</title>

    <!-- Bootstrap CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
        crossorigin="anonymous"
    />
    <link rel="stylesheet" href="../assets/ProyectoFinal_Styles.css">
    <script src="../controllers/env.js"></script>
</head>

<body>
    <header>
    </header>

    <main>
        <div class="card-container">
            <div class="card">
                <div class="card-body">
                    <div class="logo-header">
                        <div class="logo-text">LOOP</div>
                        <div class="logo-subtitle">Wellness Tracker</div>
                    </div>

                    <div class="separator"></div>

                    <!-- FORM LOGIN -->
                    <form id="formLogin" class="form-section">
                        <div class="form-title">Welcome back!</div>

                        <!-- Mensaje de error -->
                        <div id="loginError" class="alert alert-danger" role="alert" style="display: none;">
                        </div>

                        <!-- Mensaje de éxito -->
                        <div id="loginSuccess" class="alert alert-success" role="alert" style="display: none;">
                        </div>

                        <div class="form-group">
                            <label for="loginEmail" class="form-label">Correo</label>
                            <input 
                                type="email" 
                                name="email" 
                                class="form-control" 
                                id="loginEmail" 
                                placeholder="usuario@ejemplo.com"
                                required
                            />
                        </div>

                        <div class="form-group">
                            <label for="loginPassword" class="form-label">Contraseña</label>
                            <input 
                                type="password" 
                                name="password" 
                                class="form-control" 
                                id="loginPassword" 
                                placeholder="••••••••"
                                required
                            />
                        </div>

                        <div class="button-group">
                            <button type="submit" class="btn btn-login" id="loginBtn">
                                Iniciar sesión
                            </button>
                            <button type="button" class="btn btn-register" onclick="toggleForms()">
                                Registrarse
                            </button>
                        </div>
                    </form>

                    <!-- FORM REGISTER -->
                    <form id="formRegister" class="form-section" style="display: none;">
                        <div class="form-title">Create Account</div>

                        <!-- Mensaje de error -->
                        <div id="registerError" class="alert alert-danger" role="alert" style="display: none;">
                        </div>

                        <!-- Mensaje de éxito -->
                        <div id="registerSuccess" class="alert alert-success" role="alert" style="display: none;">
                        </div>

                        <div class="form-group">
                            <label for="registerName" class="form-label">Nombre Completo</label>
                            <input 
                                type="text" 
                                name="name" 
                                class="form-control" 
                                id="registerName" 
                                placeholder="Juan Pérez"
                                required
                            />
                        </div>

                        <div class="form-group">
                            <label for="registerEmail" class="form-label">Correo</label>
                            <input 
                                type="email" 
                                name="email" 
                                class="form-control" 
                                id="registerEmail" 
                                placeholder="usuario@ejemplo.com"
                                required
                            />
                        </div>

                        <div class="form-group">
                            <label for="registerPassword" class="form-label">Contraseña</label>
                            <input 
                                type="password" 
                                name="password" 
                                class="form-control" 
                                id="registerPassword" 
                                placeholder="••••••••"
                                required
                            />
                            <small class="form-text text-muted">Mínimo 8 caracteres</small>
                        </div>

                        <div class="form-group">
                            <label for="registerConfirmPassword" class="form-label">Confirmar Contraseña</label>
                            <input 
                                type="password" 
                                name="confirm_password" 
                                class="form-control" 
                                id="registerConfirmPassword" 
                                placeholder="••••••••"
                                required
                            />
                        </div>

                        <div class="button-group">
                            <button type="submit" class="btn btn-login" id="registerBtn">
                                Crear cuenta
                            </button>
                            <button type="button" class="btn btn-register" onclick="toggleForms()">
                                Iniciar sesión
                            </button>
                        </div>
                    </form>

                    <div class="footer-text">
                        ¿No tienes cuenta? <strong onclick="toggleForms()">Regístrate aquí</strong>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer>
    </footer>

    <!-- Bootstrap JS -->
    <script
        src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyou6Dtjuetig0L8hQk6PsUSlQN6iQrDc7V7S7"
        crossorigin="anonymous">
    </script>
    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
        integrity="sha384-BBtNQ+menRNFGc8AW09zWsAfj+7UZmefQKN7nWuDjbcAXnUrzpz52B8NxYL21VJV"
        crossorigin="anonymous">
    </script>

    <script>
        // Función para alternar entre formularios
        function toggleForms() {
            const formLogin = document.getElementById('formLogin');
            const formRegister = document.getElementById('formRegister');
            
            if (formRegister.style.display === 'none') {
                formLogin.style.display = 'none';
                formRegister.style.display = 'block';
            } else {
                formLogin.style.display = 'block';
                formRegister.style.display = 'none';
            }
        }

        // Manejo de LOGIN
        document.getElementById('formLogin').addEventListener('submit', async function(e) {
            e.preventDefault();

            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            const errorDiv = document.getElementById('loginError');
            const successDiv = document.getElementById('loginSuccess');

            // Limpiar mensajes
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            // Validaciones
            if (!email || !password) {
                errorDiv.textContent = 'Por favor, completa todos los campos.';
                errorDiv.style.display = 'block';
                return;
            }

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                if (response.ok) {
                    const user = await response.json();
                    
                    // Guardar datos del usuario en sessionStorage
                    sessionStorage.setItem('user', JSON.stringify(user));
                    
                    // Mostrar mensaje de éxito
                    successDiv.textContent = '¡Login exitoso! Redirigiendo...';
                    successDiv.style.display = 'block';

                    // Redirigir después de 1.5 segundos
                    setTimeout(() => {
                        window.location.href = '/home.html';
                    }, 1500);

                } else if (response.status === 401) {
                    errorDiv.textContent = 'Email o contraseña incorrectos. Intenta de nuevo.';
                    errorDiv.style.display = 'block';
                } else {
                    errorDiv.textContent = 'Error en el login. Intenta de nuevo.';
                    errorDiv.style.display = 'block';
                }

            } catch (error) {
                console.error('Error:', error);
                errorDiv.textContent = 'Error de conexión. Intenta de nuevo.';
                errorDiv.style.display = 'block';
            }
        });

        // Manejo de REGISTER
        document.getElementById('formRegister').addEventListener('submit', async function(e) {
            e.preventDefault();

            const name = document.getElementById('registerName').value.trim();
            const email = document.getElementById('registerEmail').value.trim();
            const password = document.getElementById('registerPassword').value.trim();
            const confirmPassword = document.getElementById('registerConfirmPassword').value.trim();
            const errorDiv = document.getElementById('registerError');
            const successDiv = document.getElementById('registerSuccess');

            // Limpiar mensajes
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            // Validaciones en cliente
            if (!name || !email || !password || !confirmPassword) {
                errorDiv.textContent = 'Todos los campos son obligatorios.';
                errorDiv.style.display = 'block';
                return;
            }

            if (password !== confirmPassword) {
                errorDiv.textContent = 'Las contraseñas no coinciden. Intenta de nuevo.';
                errorDiv.style.display = 'block';
                return;
            }

            if (password.length < 8) {
                errorDiv.textContent = 'La contraseña debe tener mínimo 8 caracteres.';
                errorDiv.style.display = 'block';
                return;
            }

            // Validar formato de email
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                errorDiv.textContent = 'Por favor, ingresa un correo electrónico válido.';
                errorDiv.style.display = 'block';
                return;
            }

            try {
                const response = await fetch('/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        name, 
                        email, 
                        password, 
                        confirm_password: confirmPassword 
                    })
                });

                if (response.ok) {
                    const user = await response.json();
                    
                    // Mostrar mensaje de éxito
                    successDiv.textContent = '¡Registro exitoso! Redirigiendo...';
                    successDiv.style.display = 'block';

                    // Guardar datos del usuario
                    sessionStorage.setItem('user', JSON.stringify(user));

                    // Limpiar formulario
                    document.getElementById('registerName').value = '';
                    document.getElementById('registerEmail').value = '';
                    document.getElementById('registerPassword').value = '';
                    document.getElementById('registerConfirmPassword').value = '';

                    // Redirigir después de 1.5 segundos
                    setTimeout(() => {
                        window.location.href = '/home.html';
                    }, 1500);

                } else {
                    // Obtener mensaje de error del backend
                    let errorMessage = 'Error en el registro. Intenta de nuevo.';
                    try {
                        const errorData = await response.json();
                        errorMessage = errorData.error || errorData.message || errorMessage;
                    } catch (e) {
                        errorMessage = 'Error en el registro. Intenta de nuevo.';
                    }
                    
                    errorDiv.textContent = errorMessage;
                    errorDiv.style.display = 'block';
                }

            } catch (error) {
                console.error('Error en registro:', error);
                errorDiv.textContent = 'Error de conexión. Intenta de nuevo.';
                errorDiv.style.display = 'block';
            }
        });

        // Si ya hay un usuario logueado, redirigir a home
        if (sessionStorage.getItem('user')) {
            window.location.href = '/home.html';
        }
    </script>
</body>
</html>
