<!doctype html>
<html lang="es">
<head>
    <title>Mood Tracker</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/styles_mood.css">
</head>
<body>

    <div class="bg-overlay"></div>

    <div class="page">

        <!-- Header -->
        <header class="header">
            <div class="header-text">
                <p class="today-date" id="todayDate"></p>
                <h1 class="main-title">¿Como te<br>Sientes Hoy?</h1>
            </div>
        </header>

        <!-- Emoji -->
        <div class="emoji-section">
            <div class="emoji-rings">
                <div class="ring ring-3"></div>
                <div class="ring ring-2"></div>
                <div class="ring ring-1"></div>
                <div class="emoji-circle" id="emojiCircle">
                    <svg id="moodFace" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" width="110" height="110">
                        <!-- Cara -->
                        <circle cx="50" cy="50" r="48" fill="#c0392b" id="faceColor"/>
                        <!-- Ojos -->
                        <circle cx="35" cy="40" r="5" fill="#3a2a00" id="eyeL"/>
                        <circle cx="65" cy="40" r="5" fill="#3a2a00" id="eyeR"/>
                        <!-- Boca -->
                        <path id="mouthPath" d="M 30 62 Q 50 78 70 62" stroke="#3a2a00" stroke-width="4" fill="none" stroke-linecap="round"/>
                    </svg>
                </div>
            </div>
            <p class="mood-label" id="moodLabel">Feliz</p>
        </div>

        <!-- Slider -->
        <div class="slider-section">
            <div class="slider-track-wrapper">
                <input type="range" min="0" max="100" value="0" class="mood-slider" id="moodSlider">
                <div class="slider-labels">
                    <span class="dot" style="background:#c0392b"></span>
                    <span class="dot" style="background:#385196"></span>
                    <span class="dot" style="background:#f5a623"></span>
                    <span class="dot" style="background:#23a133"></span>
                </div>
            </div>
        </div>

        <!-- Botón guardar (solo visual, sin función) -->
        <button class="save-btn">Guardar mood</button>

        <!-- Botón para mostrar/ocultar calendario -->
        <button class="toggle-calendar-btn" id="toggleCalendar">Ver semana</button>

        <!-- Calendario semanal (hardcodeado) -->
        <div class="weekly-calendar" id="weeklyCalendar" style="display:none">
            <h3 class="calendar-title">Esta semana</h3>
            <div class="week-row" id="weekRow"></div>
        </div>

        <div class="meditation-footer">
            <div class="footer-logo">LOOP</div>
            <button class="back-btn-main" onclick="window.location.href='home.html'">← Atrás</button>
        </div>
    </div>

    <script src="../controllers/env.js"></script>
    <script src="../controllers/auth_controller.js"></script>
    <script src="../controllers/moods_controller.js"></script>
</body>
</html>
