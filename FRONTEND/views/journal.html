<!doctype html>
<html lang="es">
<head>
    <title>Journal</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/styles_diario.css">
</head>
<body>

    <div class="bg-overlay"></div>

    <div class="page">

        <!-- Header -->
        <header class="header">
            <p class="today-date" id="todayDate"></p>
            <h1 class="main-title">Cuentame<br>sobre tu día.</h1>
        </header>

        <!-- Entrada de hoy -->
        <div class="today-card" id="todayCard" style="display: none; cursor: pointer;">
            <div class="today-card-top">
                <span class="today-label">Hoy</span>
            </div>
            <p class="entry-preview" id="todayPreview"></p>
        </div>

        <!-- Botón + -->
        <button class="add-btn" onclick="openCreateModal()">+</button>

        <!-- Entradas pasadas -->
        <div class="past-section">
            <h2 class="past-title">Entradas anteriores</h2>
            <div class="entries-list" id="entriesList">
                <p class="no-entries">Cargando entradas...</p>
            </div>
        </div>

        <!-- Footer -->
        <div class="meditation-footer">
            <div class="footer-logo">LOOP</div>
            <button class="back-btn-main" onclick="window.location.href='home.html'">← Atrás</button>
        </div>
    </div>

    <!-- MODAL PARA CREAR/EDITAR -->
    <div id="journalModal" class="modal-overlay" style="display: none;" onclick="closeModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <span class="modal-date" id="modalDate"></span>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <textarea 
                id="journalInput" 
                class="journal-textarea" 
                placeholder="Cuéntame cómo fue tu día..."
            ></textarea>
            <div class="modal-actions">
                <button class="modal-save" onclick="saveJournal()">Guardar</button>
                <button class="modal-delete" id="modalDeleteBtn" style="display: none;" onclick="deleteCurrentJournal()">Eliminar</button>
            </div>
        </div>
    </div>

    <script>
        // Mostrar fecha de hoy
        const now = new Date();
        document.getElementById('todayDate').textContent = now.toLocaleDateString('es-MX', {
            weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
        });

        // Variables globales
        let currentEditingId = null;
        let allJournals = [];

        // ==========================================
        // FUNCIONES PRINCIPALES
        // ==========================================

        // Abrir modal para crear
        function openCreateModal() {
            currentEditingId = null;
            document.getElementById('journalInput').value = '';
            document.getElementById('modalDeleteBtn').style.display = 'none';
            document.getElementById('modalDate').textContent = now.toLocaleDateString('es-MX', {
                weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
            });
            document.getElementById('journalModal').style.display = 'flex';
            document.getElementById('journalInput').focus();
        }

        // Abrir modal para editar
        function openEditModal(journalId) {
            const journal = allJournals.find(j => j.id === journalId);
            if (journal) {
                currentEditingId = journalId;
                document.getElementById('journalInput').value = journal.content;
                document.getElementById('modalDeleteBtn').style.display = 'block';
                document.getElementById('modalDate').textContent = new Date(journal.date).toLocaleDateString('es-MX', {
                    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
                });
                document.getElementById('journalModal').style.display = 'flex';
                document.getElementById('journalInput').focus();
            }
        }

        // Cerrar modal
        function closeModal(event) {
            if (event && event.target.id !== 'journalModal') return;
            document.getElementById('journalModal').style.display = 'none';
            currentEditingId = null;
        }

        // Guardar entrada
        function saveJournal() {
            const content = document.getElementById('journalInput').value.trim();
            
            if (!content) {
                alert('Por favor escribe algo en tu diario');
                return;
            }

            const user = JSON.parse(sessionStorage.getItem('user'));
            if (!user) {
                alert('❌ Debes iniciar sesión');
                window.location.href = 'login.html';
                return;
            }

            // Obtener contraseña - intenta en este orden:
            // 1. user.contraseña (si está en el objeto del usuario)
            // 2. user.password (alternativa)
            // 3. sessionStorage.getItem('password') (guardada por separado)
            const password = user.contraseña || user.password || sessionStorage.getItem('password');
            
            if (!password) {
                alert('❌ Error de autenticación: No se encontró la contraseña.\n\nPor favor, inicia sesión de nuevo.');
                window.location.href = 'login.html';
                return;
            }

            const payload = {
                title: content.substring(0, 50) + (content.length > 50 ? '...' : ''),
                content: content,
                mood: '😊',
                date: new Date().toISOString()
            };

            const endpoint = currentEditingId 
                ? `http://localhost:3000/journals/${currentEditingId}`
                : `http://localhost:3000/journals`;
            
            const method = currentEditingId ? 'PATCH' : 'POST';

            console.log('📝 Guardando entrada:', { 
                endpoint, 
                method, 
                userID: user.id,
                hasPassword: !!password
            });

            fetch(endpoint, {
                method: method,
                headers: {
                    'Content-Type': 'application/json',
                    'x-auth': password
                },
                body: JSON.stringify(payload)
            })
            .then(response => {
                console.log('Response status:', response.status);
                if (!response.ok) {
                    return response.json().then(err => {
                        throw new Error(err.error || `Error ${response.status}`);
                    });
                }
                return response.json();
            })
            .then(data => {
                console.log('✅ Entrada guardada:', data.journal);
                alert('✅ ¡Entrada guardada exitosamente!');
                closeModal();
                loadJournals();
            })
            .catch(error => {
                console.error('❌ Error:', error);
                alert('❌ Error: ' + error.message);
            });
        }

        // Eliminar entrada
        function deleteCurrentJournal() {
            if (!confirm('¿Estás seguro de que deseas eliminar esta entrada?')) return;

            const user = JSON.parse(sessionStorage.getItem('user'));
            if (!user) {
                alert('Debes iniciar sesión');
                return;
            }

            const password = user.contraseña || user.password || sessionStorage.getItem('password');
            if (!password) {
                alert('Error de autenticación');
                return;
            }

            fetch(`http://localhost:3000/journals/${currentEditingId}`, {
                method: 'DELETE',
                headers: {
                    'x-auth': password
                }
            })
            .then(response => {
                if (!response.ok) throw new Error('Error al eliminar');
                return response.json();
            })
            .then(data => {
                alert('✅ Entrada eliminada');
                closeModal();
                loadJournals();
            })
            .catch(error => {
                console.error('Error:', error);
                alert('❌ Error: ' + error.message);
            });
        }

        // Cargar entradas
        function loadJournals() {
            const user = JSON.parse(sessionStorage.getItem('user'));
            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            const password = user.contraseña || user.password || sessionStorage.getItem('password');
            if (!password) {
                alert('Error: Falta la contraseña. Inicia sesión de nuevo.');
                window.location.href = 'login.html';
                return;
            }

            console.log('📖 Cargando journals...');

            fetch('http://localhost:3000/journals?limit=100', {
                method: 'GET',
                headers: {
                    'x-auth': password
                }
            })
            .then(response => {
                if (!response.ok) throw new Error('Error al cargar entradas');
                return response.json();
            })
            .then(data => {
                console.log('✅ Journals cargados:', data.data.length);
                allJournals = data.data;
                displayJournals(data.data);
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('entriesList').innerHTML = '<p class="no-entries">❌ Error al cargar las entradas</p>';
            });
        }

        // Mostrar entradas
        function displayJournals(journals) {
            const entriesList = document.getElementById('entriesList');
            const todayCard = document.getElementById('todayCard');
            
            if (journals.length === 0) {
                entriesList.innerHTML = '<p class="no-entries">No hay entradas aún</p>';
                todayCard.style.display = 'none';
                return;
            }

            // Mostrar entrada de hoy si existe
            const today = new Date().toISOString().split('T')[0];
            const todayEntry = journals.find(j => j.date.split('T')[0] === today);
            
            if (todayEntry) {
                document.getElementById('todayPreview').textContent = todayEntry.content.substring(0, 100) + (todayEntry.content.length > 100 ? '...' : '');
                todayCard.style.display = 'flex';
                todayCard.onclick = () => openEditModal(todayEntry.id);
            } else {
                todayCard.style.display = 'none';
            }

            // Mostrar entradas anteriores (excluir hoy)
            const pastEntries = journals.filter(j => j.date.split('T')[0] !== today);
            
            if (pastEntries.length === 0) {
                entriesList.innerHTML = '<p class="no-entries">No hay más entradas</p>';
                return;
            }

            entriesList.innerHTML = pastEntries.map(entry => `
                <div class="entry-card" onclick="openEditModal(${entry.id})">
                    <div class="entry-card-top">
                        <span class="entry-card-date">${new Date(entry.date).toLocaleDateString('es-MX', {
                            weekday: 'long',
                            year: 'numeric',
                            month: 'long',
                            day: 'numeric'
                        })}</span>
                        <button class="entry-edit-btn" onclick="event.stopPropagation(); openEditModal(${entry.id})">✏️</button>
                    </div>
                    <p class="entry-card-text">${entry.content.substring(0, 100)}${entry.content.length > 100 ? '...' : ''}</p>
                </div>
            `).join('');
        }

        // ==========================================
        // INICIALIZAR AL CARGAR
        // ==========================================

        console.log('🎯 Inicializando journal...');
        loadJournals();

        // Cerrar modal con Escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });
    </script>
    <script src="../controllers/auth_controller.js"></script>
    <script src="../controllers/journals_controller.js"></script>
</body>
</html>
