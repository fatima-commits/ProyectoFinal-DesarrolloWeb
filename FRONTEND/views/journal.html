<!doctype html>
<html lang="es">
<head>
    <title>Journal</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/styles_diario.css">
</head>
<body>

    <div class="bg-overlay"></div>

    <div class="page">

        <!-- Header -->
        <header class="header">
            <p class="today-date" id="todayDate"></p>
            <h1 class="main-title">Cuentame<br>sobre tu día.</h1>
        </header>

        <!-- Entrada de hoy -->
        <div class="today-card" id="todayCard" style="display: none; cursor: pointer;">
            <div class="today-card-top">
                <span class="today-label">Hoy</span>
            </div>
            <p class="entry-preview" id="todayPreview"></p>
        </div>

        <!-- Botón + -->
        <button class="add-btn" onclick="openCreateModal()">+</button>

        <!-- Entradas pasadas -->
        <div class="past-section">
            <h2 class="past-title">Entradas anteriores</h2>
            <div class="entries-list" id="entriesList">
                <p class="no-entries">Cargando entradas...</p>
            </div>
        </div>

        <!-- Footer -->
        <div class="meditation-footer">
            <div class="footer-logo">LOOP</div>
            <button class="back-btn-main" onclick="window.location.href='home.html'">← Atrás</button>
        </div>
    </div>

    <!-- MODAL PARA CREAR/EDITAR -->
    <div id="journalModal" class="modal-overlay" style="display: none;" onclick="closeModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <span class="modal-date" id="modalDate"></span>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <textarea 
                id="journalInput" 
                class="journal-textarea" 
                placeholder="Cuéntame cómo fue tu día..."
            ></textarea>
             <div class="image-section">
                <label class="upload-image-btn">
                    📷 Agregar imagen
                    <input type="file" id="imageInput" accept="image/*" style="display:none" onchange="previewImage(event)">
                </label>
                <div id="imagePreview" style="display:none">
                    <img id="previewImg" style="width:100%; border-radius:12px; margin-top:8px;">
                    <button onclick="removeImage()">✕ Quitar imagen</button>
                </div>
            </div>
            <div class="modal-actions">
                <button class="modal-save" onclick="saveJournal()">Guardar</button>
                <button class="modal-delete" id="modalDeleteBtn" style="display: none;" onclick="deleteCurrentJournal()">Eliminar</button>
            </div>
        </div>
    </div>

    <script src="../controllers/env.js"></script>
    <script src="../controllers/auth_controller.js"></script>
    <script src="../controllers/journals_controller.js"></script>
    </body>
</html>
